spring:
  application:
    name: ledge
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      application: ledge

---
spring:
  config:
    activate:
      on-profile: local
  autoconfigure:
    exclude: []   # override: enable all autoconfiguration for local stack
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ledge
    username: ml_user
    password: ${POSTGRES_PASSWORD}
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
clickhouse:
  url: jdbc:clickhouse://localhost:8123/ledge
